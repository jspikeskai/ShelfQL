services:
  db:
    image: mysql:8.4
    restart: always
    network_mode: host
    environment:
      MYSQL_DATABASE: shelfql_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password}
    ports:
      - "3306:3306"
    volumes:
      - ./db.data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root_password}
      DB_NAME: shelfql_db
    ports:
      - "8080:8080"